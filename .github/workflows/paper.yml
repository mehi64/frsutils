name: JOSS Paper

on:
  push:
    branches: [main]
    paths:
      - "paper.md"
      - "paper.bib"
      - "CITATION.cff"
      - "scripts/validate_joss_submission.py"
      - "tests/repository_tests/test_joss_submission_readiness.py"
      - ".github/workflows/paper.yml"
  pull_request:
    paths:
      - "paper.md"
      - "paper.bib"
      - "CITATION.cff"
      - "scripts/validate_joss_submission.py"
      - "tests/repository_tests/test_joss_submission_readiness.py"
      - ".github/workflows/paper.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate paper and citation metadata
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install metadata validation tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install cffconvert pytest

      - name: Validate CITATION.cff
        run: cffconvert --validate

      - name: Validate JOSS repository contract
        run: python scripts/validate_joss_submission.py

      - name: Run JOSS readiness tests
        run: python -m pytest tests/repository_tests/test_joss_submission_readiness.py -q

  paper:
    name: Build JOSS draft PDF
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper.md

      - name: Upload paper artifact
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper-draft
          path: paper.pdf
          if-no-files-found: error
