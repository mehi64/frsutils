name: Extended Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: read

concurrency:
  group: extended-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  slow-tests:
    name: Slow tests (shard ${{ matrix.shard_index }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard_index: [0, 1, 2, 3]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Run deterministic slow-test shard
        run: |
          python scripts/run_slow_test_shard.py \
            --shard-index ${{ matrix.shard_index }} \
            --shard-count 4
