name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Run default test suite
        run: python -m pytest tests -ra

  package:
    name: Build and validate package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Verify wheel contents
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              names = archive.namelist()

          required = {
              "frsutils/__init__.py",
              "frsutils/api/__init__.py",
              "frsutils/core/__init__.py",
          }
          missing = sorted(required.difference(names))
          uppercase = sorted(name for name in names if name.startswith("FRsutils/"))

          if missing:
              raise SystemExit(f"Wheel is missing package files: {missing}")
          if uppercase:
              raise SystemExit("Wheel contains the obsolete uppercase package path")

          print(f"Validated wheel contents: {wheel.name}")
          PY

      - name: Install and import the built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          cd /tmp
          python -c "import frsutils; print(frsutils.__file__)"
          python -m pip check

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frsutils-distributions
          path: dist/*
          if-no-files-found: error
