name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip check

      - name: Run scientific reference-data contract tests
        run: python -m pytest tests/reference_data_tests -ra

      - name: Run default test suite
        run: python -m pytest tests -ra

      - name: Enforce public API branch coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/api \
            --cov=frsutils/api \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=95 \
            -ra

      - name: Enforce core branch coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/core_tests tests/models_tests tests/api \
            --cov=frsutils/core \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=95 \
            -ra

      - name: Run reference-study smoke test
        if: matrix.python-version == '3.12'
        run: |
          python studies/fuzzy_rough_reference_study/run_study.py \
            --skip-benchmark \
            --skip-figures \
            --output-dir /tmp/frsutils-reference-study-smoke

  package:
    name: Build and validate package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Verify distribution contents
        run: |
          python - <<'PY'
          from pathlib import Path
          from tarfile import open as open_tar
          from zipfile import ZipFile

          wheel = next(Path("dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              wheel_names = set(archive.namelist())

          required_wheel = {
              "frsutils/__init__.py",
              "frsutils/api/__init__.py",
              "frsutils/core/__init__.py",
          }
          missing_wheel = sorted(required_wheel.difference(wheel_names))
          uppercase = sorted(
              name for name in wheel_names if name.startswith("FRsutils/")
          )

          if missing_wheel:
              raise SystemExit(
                  f"Wheel is missing package files: {missing_wheel}"
              )
          if uppercase:
              raise SystemExit(
                  "Wheel contains the obsolete uppercase package path"
              )

          sdist = next(Path("dist").glob("*.tar.gz"))
          with open_tar(sdist, "r:gz") as archive:
              sdist_names = set(archive.getnames())

          reference_data_files = {
              path.as_posix()
              for path in Path("tests/reference_data").glob("*.json")
          }
          required_sdist_suffixes = {
              "studies/fuzzy_rough_reference_study/run_study.py",
              "studies/fuzzy_rough_reference_study/study_config.json",
              "studies/fuzzy_rough_reference_study/results/study_manifest.json",
              "docs/user/reference_study.md",
              "docs/developer/archive_and_doi.md",
              "docs/developer/joss_submission_checklist.md",
              "scripts/validate_installed_public_api.py",
              "scripts/validate_joss_submission.py",
              "RELEASE_NOTES_v0.1.0.md",
              "tests/reference_data_loader.py",
              "tests/reference_data_store.py",
              "tests/reference_data/README.md",
              "tests/reference_data_tests/test_reference_data_contract.py",
              "tests/test_procedures.md",
              *reference_data_files,
          }
          missing_sdist = sorted(
              suffix
              for suffix in required_sdist_suffixes
              if not any(name.endswith(suffix) for name in sdist_names)
          )
          if missing_sdist:
              raise SystemExit(
                  "Source distribution is missing required files: "
                  f"{missing_sdist}"
              )
          if any(
              name.endswith("tests/synthetic_data_store.py")
              for name in sdist_names
          ):
              raise SystemExit(
                  "Source distribution contains the obsolete reference-data "
                  "accessor name"
              )

          print(f"Validated wheel contents: {wheel.name}")
          print(f"Validated source distribution contents: {sdist.name}")
          PY

      - name: Validate the built wheel in a read-only environment
        run: |
          python -m venv /tmp/frsutils-wheel-smoke
          /tmp/frsutils-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/frsutils-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/frsutils-wheel-smoke/bin/python -m pip check

          mkdir -p "$GITHUB_WORKSPACE/test_reports"
          package_dir=$(
            /tmp/frsutils-wheel-smoke/bin/python -c \
              "import pathlib, frsutils; print(pathlib.Path(frsutils.__file__).parent)"
          )
          chmod -R a-w "$package_dir"
          rm -rf /tmp/frsutils-wheel-read-only-cwd
          mkdir -p /tmp/frsutils-wheel-read-only-cwd
          chmod a-w /tmp/frsutils-wheel-read-only-cwd
          cd /tmp/frsutils-wheel-read-only-cwd
          PYTHONDONTWRITEBYTECODE=1 \
            /tmp/frsutils-wheel-smoke/bin/python \
            "$GITHUB_WORKSPACE/scripts/validate_installed_public_api.py" \
            --require-installed \
            --require-package-read-only \
            --require-cwd-read-only \
            --output-json \
            "$GITHUB_WORKSPACE/test_reports/wheel_public_api_validation.json"

      - name: Validate the built source distribution in a read-only environment
        run: |
          python -m venv /tmp/frsutils-sdist-smoke
          /tmp/frsutils-sdist-smoke/bin/python -m pip install --upgrade pip
          /tmp/frsutils-sdist-smoke/bin/python -m pip install dist/*.tar.gz
          /tmp/frsutils-sdist-smoke/bin/python -m pip check

          mkdir -p "$GITHUB_WORKSPACE/test_reports"
          package_dir=$(
            /tmp/frsutils-sdist-smoke/bin/python -c \
              "import pathlib, frsutils; print(pathlib.Path(frsutils.__file__).parent)"
          )
          chmod -R a-w "$package_dir"
          rm -rf /tmp/frsutils-sdist-read-only-cwd
          mkdir -p /tmp/frsutils-sdist-read-only-cwd
          chmod a-w /tmp/frsutils-sdist-read-only-cwd
          cd /tmp/frsutils-sdist-read-only-cwd
          PYTHONDONTWRITEBYTECODE=1 \
            /tmp/frsutils-sdist-smoke/bin/python \
            "$GITHUB_WORKSPACE/scripts/validate_installed_public_api.py" \
            --require-installed \
            --require-package-read-only \
            --require-cwd-read-only \
            --output-json \
            "$GITHUB_WORKSPACE/test_reports/sdist_public_api_validation.json"

      - name: Upload distribution and validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frsutils-distributions
          path: |
            dist/*
            test_reports/*.json
          if-no-files-found: error
